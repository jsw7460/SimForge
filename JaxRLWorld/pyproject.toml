[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rlworld"
version = "0.1.0"
requires-python = ">=3.8"
dependencies = [
    "equinox",
    "optax",
    "warp",
    "gymnasium",
    "wandb",
    "pytz",
]

[tool.setuptools.packages.find]
where = ["."]